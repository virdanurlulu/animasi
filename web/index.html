<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moody Chart Web UI</title>
    <link rel="stylesheet" href="/web/styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  </head>
  <body>
    <main>
      <h1>Moody Chart — Web UI</h1>
      <p class="subtitle">Frontend web + backend Python (core engineering modules).</p>

      <section class="card">
        <form id="calc-form">
          <div class="grid">
            <label>Flow rate Q [m³/s]<input type="number" step="0.001" name="flow_rate" value="0.02" required /></label>
            <label>Diameter D [m]<input type="number" step="0.001" name="diameter" value="0.1" required /></label>
            <label>Length L [m]<input type="number" step="0.1" name="length" value="30" required /></label>
            <label>Roughness ε [m]<input type="number" step="0.000001" name="roughness" value="0.000045" required /></label>
            <label>Density ρ [kg/m³]<input type="number" step="0.1" name="density" value="998.2" required /></label>
            <label>Viscosity μ [Pa·s]<input type="number" step="0.000001" name="viscosity" value="0.001003" required /></label>
            <label>Method
              <select name="method">
                <option value="colebrook">Colebrook</option>
                <option value="haaland">Haaland</option>
                <option value="swamee-jain">Swamee-Jain</option>
              </select>
            </label>
          </div>
          <button type="submit">Hitung & Tampilkan</button>
        </form>
      </section>

      <section class="card">
        <h2>Hasil</h2>
        <div id="results" class="results">Belum ada perhitungan.</div>
      </section>

      <section class="card">
        <h2>Moody Chart</h2>
        <div id="moody-chart"></div>
      </section>
    </main>
    <script src="/web/app.js"></script>
  </body>
</html>
